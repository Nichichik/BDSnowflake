services:
  db:
    image: postgres:15
    container_name: postgres_snowflake

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pet_shop_db

    ports:
      - "5433:5432"

    volumes:
      - ./scripts:/docker-entrypoint-initdb.d
      - ./исходные данные:/data